<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Driver Registration page</title>
    <link href="registrationPages.css">
</head>
<body>
<form action="driverRegister" method="post">
    <div class="container">
        <h1>Sign Up</h1>
        <p>Please fill in this form to create a driver account.</p>
        <hr>
        <label><b>Username</b></label>
        <input type="text" placeholder="Enter Username" name="username" required>

        <label><b>First Name</b></label>
        <input type="text" placeholder="Enter First Name" name="firstName" required>

        <label><b>Last Name</b></label>
        <input type="text" placeholder="Enter Last Name" name="lastName" required>

        <label><b>Phone Number<b></label>
        <input type="number" placeholder="Enter Phone Number" name="phoneNumber" required>

        <label><b>Car Brand</b></label>
        <input type="text" placeholder="Enter Car Brand" name="carBrand" required>

        <label><b>Email</b></label>
        <input type="text" placeholder="Enter Email" name="email" required>

        <label><b>Password</b></label>
        <input type="password" placeholder="Enter Password" name="psw" required>

        <label><b>Repeat Password</b></label>
        <input type="password" placeholder="Repeat Password" name="psw-repeat" required>


        <label>
            <input type="checkbox" checked="checked" name="remember" style="margin-bottom:15px"> Remember me
        </label>

        <p>By creating an account you agree to our <a href="#" style="color:dodgerblue">Terms & Privacy</a>.</p>

        <div class="confim">
            <button type="button" class="cancelbtn">Cancel</button>
            <button type="submit" class="signupbtn">Sign Up</button>
        </div>
        <div class="container signin">
            <p>Already have an account? <a href="driverSignIn.html">Sign in</a>.</p>
        </div>
    </div>
</form>

</body>
</html>
